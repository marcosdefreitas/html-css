<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 {
            display: block;
            background-color: lightgrey;
            height: auto;
            width: 300px;

            border: 10px solid darkslategray;

            padding: 10px;

            text-align: center;

            margin: 20px auto 40px auto;

            outline: 5px dashed salmon;
        }
        a {
            display: block;
            width: 270px;
            border-width: 10px;
            border-style: solid;
            border-color: red;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como funciona</p>
</body>
</html>
