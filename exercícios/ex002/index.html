<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e Quebras de Linha</h1>
    <hr>
    <p>Você pode escrever um parágrafo de qualquer jeito, basta colocar tudo no meio das tags &lt;p&gt; e &lt;/p&gt;</p>

    <p>Se precisar quebrar em algum lugar, como esse,<br> 
    use a tag &lt;br&gt;</p> <!--INVISÍVEL-->

    <P>Vamos adicionar alguns símbolos especiais:
    <br>
    &reg; <br> &copy;<br> &trade;<br> &dollar;<br> &uarr;<br> &rarr;<br> &larr;<br> &darr; <br>  &Delta;</P>

    <p>Vamos adicionar alguns emojis:
    <br>
    &#x1F596; <br>&#x1F913;<br>
    </p>
</body>
</html>
