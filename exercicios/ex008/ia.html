<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exemplo de Mark</title>
    <style>
        /* Estiliza todas as tags <mark> da página */
        mark {
            background-color: lightgreen; /* Mudar cor para verde */
            color: black;
            padding: 2px;
        }
    </style>
</head>
<body>
    <p>O resultado da pesquisa foi: <mark>HTML5</mark>.</p>
</body>
</html>
