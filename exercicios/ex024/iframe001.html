<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe</title>
    <style>
        iframe {
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <h1>Testando Iframes</h1>
    <p>Abrindo o site do 

        <iframe src="https://www.cursoemvideo.com" frameborder="0" width="500px" height="300px"></iframe>

        pelo Iframe</p>
        <p>O site do 

            <iframe src="https://www.google.com" frameborder="0"></iframe>

            também é muito legal, mas não funciona no Iframe</p>
        <p>
            O repositório do Guanabara

            <iframe src="https://gustavoguanabara.github.io" frameborder="0" width="500px" height="300px">
                <a href="https://gustavoguanabara.github.io"> Curso em Video</a>
            </iframe>

        </p>
        <p>
            Instagram
            <iframe src="https://www.instagram.com" frameborder="0"></iframe>

        </p>
</body>
</html>
