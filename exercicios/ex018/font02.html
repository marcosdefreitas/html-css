<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Berkshire+Swash&family=Fredericka+the+Great&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap');
        @font-face {
            font-family: 'oldlondon';
            src: url(OldLondon.ttf) ,url(Olondona.otf);
            font-weight: normal;
            font-style: normal;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            font-family: 'oldlondon', times, serif;
            font-size: 4em;
            font-weight: normal;
            text-align: center;
        }
        p {
            font-family: "Berkshire Swash", serif;
            font-weight: normal;
            font-style: normal;
        }
    </style>
</head>
<body>
    <h1>que bosta hein mn</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Eligendi alias enim fuga id accusantium neque mollitia praesentium ducimus asperiores beatae repellendus excepturi laborum, provident corporis odit tempora aspernatur expedita est?</p>
</body>
</html>
