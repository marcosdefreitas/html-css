<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Fonts</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bad+Script&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Fredericka+the+Great&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap');
        @font-face {
            font-family: 'Oldlondon';
            src: url(OldLondon.ttf) url(Olondona.otf);
            font-weight: normal;
            font-style: normal;
        }
        body {
            font-family: 'Fredericka The Great', times, serif;
        }
        h1 {
            font-family: 'Oldlondon', times, serif;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Fontes com Google Fonts</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolorem atque ducimus eum nostrum, voluptatum hic facilis? Nam, fugiat cupiditate eligendi enim itaque harum amet necessitatibus debitis, tempore eos hic cumque.</p>

</body>
</html>
